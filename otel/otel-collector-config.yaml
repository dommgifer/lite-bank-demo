receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:3001"
          allowed_headers:
            - "*"

connectors:
  # Span Metrics Connector - 從 traces 自動生成 metrics
  # service.name 是預設的 resource attribute，會自動包含
  spanmetrics:
    histogram:
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - name: http.method
        default: GET
      - name: http.status_code
      - name: http.route
    exemplars:
      enabled: true
    dimensions_cache_size: 1000
    aggregation_temporality: "AGGREGATION_TEMPORALITY_CUMULATIVE"
    metrics_flush_interval: 15s

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Filter out health check traces to reduce noise
  filter/healthcheck:
    error_mode: ignore
    traces:
      span:
        - 'IsMatch(attributes["http.target"], ".*health.*")'
        - 'IsMatch(attributes["url.path"], ".*health.*")'
        - 'IsMatch(attributes["http.route"], ".*health.*")'
        - 'IsMatch(name, ".*health.*")'

  # 100% sampling for Phase 1 demo
  probabilistic_sampler:
    sampling_percentage: 100

  # Add resource attributes
  resource:
    attributes:
      - key: service.namespace
        value: lite-bank-demo
        action: upsert
      - key: deployment.environment
        value: local
        action: upsert


exporters:
  # Export traces to Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Export logs to Loki
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: true
      job: true
      instance: true
      level: true

  # Export metrics to Prometheus
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: litebank
    enable_open_metrics: true
    resource_to_telemetry_conversion:
      enabled: true

  # Logging for debugging
  logging:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter/healthcheck, probabilistic_sampler, batch, resource]
      exporters: [otlp/tempo, spanmetrics, logging]

    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [loki, logging]

    # Application metrics (直接從服務發送)
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [prometheus]

    # Span-derived metrics (從 traces 自動生成，帶有 exemplars)
    metrics/spanmetrics:
      receivers: [spanmetrics]
      processors: [batch]
      exporters: [prometheus]

  telemetry:
    metrics:
      address: 0.0.0.0:8888
