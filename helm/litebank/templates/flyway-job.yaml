{{- if .Values.infrastructure.postgres.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: flyway-migration-{{ .Release.Revision }}
  labels:
    {{- include "litebank.labels" . | nindent 4 }}
    app.kubernetes.io/name: flyway
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flyway
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
      containers:
        - name: flyway
          image: flyway/flyway:10-alpine
          args:
            - migrate
          env:
            - name: FLYWAY_URL
              value: jdbc:postgresql://{{ include "litebank.postgresHost" . }}:{{ include "litebank.postgresPort" . }}/{{ .Values.infrastructure.postgres.database }}
            - name: FLYWAY_USER
              value: {{ .Values.infrastructure.postgres.user }}
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litebank-secrets
                  key: db-password
            - name: FLYWAY_SCHEMAS
              value: "public"
            - name: FLYWAY_LOCATIONS
              value: "filesystem:/flyway/sql"
          volumeMounts:
            - name: migrations
              mountPath: /flyway/sql
      volumes:
        - name: migrations
          configMap:
            name: flyway-migrations
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flyway-migrations
  labels:
    {{- include "litebank.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-10"
# SQL 由 chart 內 migrations/*.sql 自動生成（單一來源：db/migration，經 symlink）。
# 新增 migration 只要丟一個 V{n}__*.sql 到 db/migration，不需再改這個檔案。
data:
{{- (.Files.Glob "migrations/*.sql").AsConfig | nindent 2 }}
{{- end }}
