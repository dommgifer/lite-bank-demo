{{- if .Values.infrastructure.postgres.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: flyway-migration-{{ .Release.Revision }}
  labels:
    {{- include "litebank.labels" . | nindent 4 }}
    app.kubernetes.io/name: flyway
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flyway
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
      containers:
        - name: flyway
          image: flyway/flyway:10-alpine
          args:
            - migrate
          env:
            - name: FLYWAY_URL
              value: jdbc:postgresql://{{ include "litebank.postgresHost" . }}:{{ include "litebank.postgresPort" . }}/{{ .Values.infrastructure.postgres.database }}
            - name: FLYWAY_USER
              value: {{ .Values.infrastructure.postgres.user }}
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litebank-secrets
                  key: db-password
            - name: FLYWAY_SCHEMAS
              value: "public"
            - name: FLYWAY_LOCATIONS
              value: "filesystem:/flyway/sql"
          volumeMounts:
            - name: migrations
              mountPath: /flyway/sql
      volumes:
        - name: migrations
          configMap:
            name: flyway-migrations
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flyway-migrations
  labels:
    {{- include "litebank.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-10"
data:
  V1__create_users_table.sql: |
    -- V1: Create users table for authentication
    CREATE TABLE users (
        user_id BIGSERIAL PRIMARY KEY,
        username VARCHAR(50) UNIQUE NOT NULL,
        email VARCHAR(100) UNIQUE NOT NULL,
        password_hash VARCHAR(255) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP
    );

    -- Index for faster lookups
    CREATE INDEX idx_users_username ON users(username);
    CREATE INDEX idx_users_email ON users(email);

    -- Insert demo users (password is 'password123' hashed with bcrypt cost=10)
    INSERT INTO users (username, email, password_hash) VALUES
        ('alice', 'alice@example.com', '$2a$10$qec4Yv7E8SELBzIInFacROUk3.k82Zag3/c2hLbSuCCR85qneH9h2'),
        ('bob', 'bob@example.com', '$2a$10$qec4Yv7E8SELBzIInFacROUk3.k82Zag3/c2hLbSuCCR85qneH9h2'),
        ('charlie', 'charlie@example.com', '$2a$10$qec4Yv7E8SELBzIInFacROUk3.k82Zag3/c2hLbSuCCR85qneH9h2');

  V2__create_accounts_table.sql: |
    -- V2: Create accounts table
    CREATE TABLE accounts (
        account_id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL,
        currency VARCHAR(3) NOT NULL,
        balance NUMERIC(15, 2) NOT NULL DEFAULT 0.00,
        status VARCHAR(20) NOT NULL DEFAULT 'ACTIVE',
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT fk_accounts_user FOREIGN KEY (user_id) REFERENCES users(user_id) ON DELETE CASCADE,
        CONSTRAINT chk_balance_positive CHECK (balance >= 0),
        CONSTRAINT chk_currency_code CHECK (currency ~ '^[A-Z]{3}$'),
        CONSTRAINT chk_status_valid CHECK (status IN ('ACTIVE', 'FROZEN', 'CLOSED'))
    );

    -- Indexes for performance
    CREATE INDEX idx_accounts_user_id ON accounts(user_id);
    CREATE INDEX idx_accounts_currency ON accounts(currency);
    CREATE INDEX idx_accounts_status ON accounts(status);

    -- Insert demo accounts
    INSERT INTO accounts (user_id, currency, balance) VALUES
        -- Alice's accounts
        (1, 'USD', 1000.00),
        (1, 'EUR', 500.00),
        (1, 'TWD', 30000.00),
        -- Bob's accounts
        (2, 'USD', 2000.00),
        (2, 'JPY', 100000.00),
        -- Charlie's accounts
        (3, 'USD', 500.00),
        (3, 'EUR', 1000.00);

  V3__create_transactions_table.sql: |
    -- V3: Create transactions table (append-only)
    CREATE TABLE transactions (
        transaction_id BIGSERIAL PRIMARY KEY,
        account_id BIGINT NOT NULL,
        transaction_type VARCHAR(20) NOT NULL,
        amount NUMERIC(15, 2) NOT NULL,
        currency VARCHAR(3) NOT NULL,
        balance_after NUMERIC(15, 2) NOT NULL,
        reference_id VARCHAR(100),
        description TEXT,
        trace_id VARCHAR(32),
        metadata JSONB,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT fk_transactions_account FOREIGN KEY (account_id) REFERENCES accounts(account_id) ON DELETE CASCADE,
        CONSTRAINT chk_transaction_type CHECK (transaction_type IN (
            'DEPOSIT', 'WITHDRAWAL', 'TRANSFER_OUT', 'TRANSFER_IN',
            'EXCHANGE_OUT', 'EXCHANGE_IN', 'FEE'
        )),
        CONSTRAINT chk_balance_after_positive CHECK (balance_after >= 0)
    );

    -- Indexes for query performance
    CREATE INDEX idx_transactions_account_id ON transactions(account_id);
    CREATE INDEX idx_transactions_created_at ON transactions(created_at DESC);
    CREATE INDEX idx_transactions_trace_id ON transactions(trace_id);
    CREATE INDEX idx_transactions_reference_id ON transactions(reference_id);
    CREATE INDEX idx_transactions_type ON transactions(transaction_type);

    -- Composite index for common query pattern
    CREATE INDEX idx_transactions_account_date ON transactions(account_id, created_at DESC);

  V4__create_saga_executions_table.sql: |
    -- V4: Create saga_executions table for SAGA pattern tracking
    CREATE TABLE saga_executions (
        saga_id VARCHAR(100) PRIMARY KEY,
        transaction_id BIGINT,
        current_step INTEGER NOT NULL DEFAULT 0,
        status VARCHAR(20) NOT NULL DEFAULT 'PENDING',
        compensate_from_step INTEGER,
        error_message TEXT,
        metadata JSONB,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT fk_saga_transaction FOREIGN KEY (transaction_id) REFERENCES transactions(transaction_id) ON DELETE SET NULL,
        CONSTRAINT chk_saga_status CHECK (status IN (
            'PENDING', 'IN_PROGRESS', 'COMPLETED', 'COMPENSATING', 'COMPENSATED', 'FAILED'
        )),
        CONSTRAINT chk_current_step CHECK (current_step >= 0 AND current_step <= 10)
    );

    -- Indexes for SAGA tracking
    CREATE INDEX idx_saga_transaction_id ON saga_executions(transaction_id);
    CREATE INDEX idx_saga_status ON saga_executions(status);
    CREATE INDEX idx_saga_created_at ON saga_executions(created_at DESC);
    CREATE INDEX idx_saga_updated_at ON saga_executions(updated_at DESC);

  V5__add_unique_user_currency_constraint.sql: |
    -- Add unique constraint to prevent duplicate accounts for same user and currency
    -- Business rule: Each user can only have one account per currency
    ALTER TABLE accounts
    ADD CONSTRAINT unique_user_currency UNIQUE (user_id, currency);

    COMMENT ON CONSTRAINT unique_user_currency ON accounts IS 'Ensures each user can only have one account per currency';

  V6__add_account_number.sql: |
    -- Add account_number column with structured format: {branch 3}-{type 2}-{sequence 7}
    -- Format: XXX-YY-ZZZZZZZ
    -- Branch: 001 = Head Office
    -- Type: 01 = Savings (TWD), 03 = Foreign Currency (USD, EUR, JPY, etc.)
    -- Sequence: 7-digit zero-padded number

    ALTER TABLE accounts
    ADD COLUMN account_number VARCHAR(15);

    -- Generate account numbers for existing accounts
    UPDATE accounts
    SET account_number = CONCAT(
        '001-',
        CASE
            WHEN currency = 'TWD' THEN '01'
            ELSE '03'
        END,
        '-',
        LPAD(account_id::TEXT, 7, '0')
    );

    -- Make account_number NOT NULL and UNIQUE after populating
    ALTER TABLE accounts
    ALTER COLUMN account_number SET NOT NULL;

    ALTER TABLE accounts
    ADD CONSTRAINT unique_account_number UNIQUE (account_number);

    -- Add index for account_number lookups
    CREATE INDEX idx_accounts_account_number ON accounts(account_number);

    COMMENT ON COLUMN accounts.account_number IS 'Structured account number: {branch 3}-{type 2}-{sequence 7}';

  V7__create_recipients_table.sql: |
    -- Create recipients table for saved recipient management
    CREATE TABLE IF NOT EXISTS recipients
    (
        recipient_id   BIGSERIAL PRIMARY KEY,
        user_id        BIGINT       NOT NULL,
        account_number VARCHAR(20)  NOT NULL,
        nickname       VARCHAR(100),
        created_at     TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at     TIMESTAMP DEFAULT CURRENT_TIMESTAMP,

        CONSTRAINT fk_recipient_user
            FOREIGN KEY (user_id)
                REFERENCES users (user_id)
                ON DELETE CASCADE,

        CONSTRAINT uk_user_account
            UNIQUE (user_id, account_number)
    );

    CREATE INDEX idx_recipients_user_id ON recipients (user_id);

    -- Insert demo data
    INSERT INTO recipients (user_id, account_number, nickname)
    VALUES (1, '001-03-0000005', 'Bob - JPY Account'),
           (1, '001-03-0000006', 'Charlie - USD Account'),
           (2, '001-03-0000002', 'Alice - EUR Account')
    ON CONFLICT (user_id, account_number) DO NOTHING;

  V8__create_analytics_tables.sql: |
    -- V8: Create analytics tables for financial health indicators

    -- Daily summary table
    CREATE TABLE daily_summary (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL,
        summary_date DATE NOT NULL,
        currency VARCHAR(3) NOT NULL,
        total_income DECIMAL(18,2) DEFAULT 0,
        total_expense DECIMAL(18,2) DEFAULT 0,
        transaction_count INT DEFAULT 0,
        ending_balance DECIMAL(18,2),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT uk_daily_summary_user_date_currency UNIQUE(user_id, summary_date, currency)
    );

    -- Monthly summary table
    CREATE TABLE monthly_summary (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL,
        year_month VARCHAR(7) NOT NULL,
        currency VARCHAR(3) NOT NULL,
        total_income DECIMAL(18,2) DEFAULT 0,
        total_expense DECIMAL(18,2) DEFAULT 0,
        net_change DECIMAL(18,2) DEFAULT 0,
        savings_rate DECIMAL(5,2),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT uk_monthly_summary_user_month_currency UNIQUE(user_id, year_month, currency)
    );

    -- Balance snapshot table
    CREATE TABLE balance_snapshot (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL,
        account_id BIGINT NOT NULL,
        currency VARCHAR(3) NOT NULL,
        balance DECIMAL(18,2) NOT NULL,
        snapshot_date DATE NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT uk_balance_snapshot_account_date UNIQUE(account_id, snapshot_date)
    );

    -- Indexes
    CREATE INDEX idx_daily_summary_user_date ON daily_summary(user_id, summary_date);
    CREATE INDEX idx_daily_summary_user_date_range ON daily_summary(user_id, summary_date DESC);
    CREATE INDEX idx_monthly_summary_user_month ON monthly_summary(user_id, year_month);
    CREATE INDEX idx_monthly_summary_user_month_range ON monthly_summary(user_id, year_month DESC);
    CREATE INDEX idx_balance_snapshot_user_date ON balance_snapshot(user_id, snapshot_date);
    CREATE INDEX idx_balance_snapshot_user_date_range ON balance_snapshot(user_id, snapshot_date DESC);
    CREATE INDEX idx_balance_snapshot_account_date_range ON balance_snapshot(account_id, snapshot_date DESC);

  V9__create_notifications_table.sql: |
    -- V9: Create notifications table for real-time notification service
    CREATE TABLE notifications (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL,
        type VARCHAR(50) NOT NULL,
        title VARCHAR(200) NOT NULL,
        message TEXT NOT NULL,
        metadata JSONB,
        read BOOLEAN DEFAULT FALSE,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        read_at TIMESTAMP,

        CONSTRAINT chk_notification_type CHECK (type IN (
            'TRANSFER_SENT',
            'TRANSFER_RECEIVED',
            'TRANSFER_FAILED',
            'DEPOSIT_SUCCESS',
            'WITHDRAWAL_SUCCESS',
            'EXCHANGE_SUCCESS',
            'SYSTEM'
        ))
    );

    -- Indexes
    CREATE INDEX idx_notifications_user_unread
        ON notifications(user_id, created_at DESC)
        WHERE read = FALSE;

    CREATE INDEX idx_notifications_user_created
        ON notifications(user_id, created_at DESC);

    CREATE INDEX idx_notifications_user_after_id
        ON notifications(user_id, id);

    CREATE INDEX idx_notifications_cleanup
        ON notifications(read, created_at);
{{- end }}
