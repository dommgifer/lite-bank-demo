{{- if .Values.gateway.enabled }}
# ===========================================
# Gateway API Resources
# ===========================================

# Gateway - 定義流量入口點
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "litebank.fullname" . }}
  labels:
    {{- include "litebank.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    {{- range .Values.gateway.listeners }}
    - name: {{ .name }}
      port: {{ .port }}
      protocol: {{ .protocol }}
      {{- if and (eq .protocol "HTTPS") .tls.enabled }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .tls.secretName }}
      {{- end }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
---
# HTTPRoute - API Gateway 主路由
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "litebank.fullname" . }}-api
  labels:
    {{- include "litebank.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "litebank.fullname" . }}
  hostnames:
    - {{ .Values.gateway.routes.host | quote }}
  rules:
    # SSE/Streaming - 長連線端點（必須放在 /api 之前，因為更具體的路徑優先匹配）
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/notifications/stream
      backendRefs:
        - name: api-gateway
          port: {{ .Values.services.apiGateway.port }}
      timeouts:
        request: 0s           # 0 = 禁用 timeout（SSE 長連線）
        backendRequest: 0s

    # API Gateway - 主要 API 路由
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: api-gateway
          port: {{ .Values.services.apiGateway.port }}
      timeouts:
        request: 30s
        backendRequest: 10s

    # 根路徑 - 導向 Dashboard 前端
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dashboard
          port: {{ .Values.services.dashboard.port }}

{{- if .Values.observability.grafana.enabled }}
---
# HTTPRoute - Grafana 路由
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "litebank.fullname" . }}-grafana
  labels:
    {{- include "litebank.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "litebank.fullname" . }}
  hostnames:
    - {{ .Values.gateway.routes.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: grafana
          port: 3000
{{- end }}

{{- range .Values.gateway.routes.extraRoutes }}
---
# HTTPRoute - {{ .name }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "litebank.fullname" $ }}-{{ .name }}
  labels:
    {{- include "litebank.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "litebank.fullname" $ }}
  hostnames:
    - {{ $.Values.gateway.routes.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .path }}
      backendRefs:
        - name: {{ .service }}
          port: {{ .port }}
{{- end }}

{{- end }}
