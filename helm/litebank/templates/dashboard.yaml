# Dashboard - React Frontend with Nginx
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  labels:
    {{- include "litebank.labels" . | nindent 4 }}
    app.kubernetes.io/name: dashboard
spec:
  replicas: {{ .Values.services.dashboard.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard
          image: "{{ .Values.global.imageRegistry }}{{ .Values.services.dashboard.image }}"
          imagePullPolicy: {{ .Values.services.common.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.services.dashboard.port }}
              protocol: TCP
          env:
            - name: API_GATEWAY_URL
              value: "http://api-gateway:{{ .Values.services.apiGateway.port }}"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:{{ .Values.services.notificationService.port }}"
            - name: OTEL_COLLECTOR_URL
              value: {{ include "litebank.otelEndpoint" . | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  labels:
    {{- include "litebank.labels" . | nindent 4 }}
    app.kubernetes.io/name: dashboard
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.services.dashboard.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/instance: {{ .Release.Name }}
