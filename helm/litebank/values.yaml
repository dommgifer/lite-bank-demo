# ===========================================
# LiteBank Helm Chart Configuration
# ===========================================

# ===========================================
# 全域設定
# ===========================================
global:
  imageRegistry: "ghcr.io/dommgifer/litebank/"
  imagePullSecrets: []

# ===========================================
# 維運排程
# ===========================================
maintenance:
  # transactions 流水帳保留清理（2026-07-11 事故：508 萬列/2.4GB 寫爆 PVC）
  txnCleanup:
    enabled: true
    schedule: "0 4 * * *"    # 每天 04:00（避開 notification cleanup 的 03:00）
    retentionDays: 30

# ===========================================
# 基礎設施
# ===========================================
infrastructure:
  postgres:
    enabled: true
    image: postgres:16-alpine
    database: litebank
    user: litebank_user
    # 2026-07-11: 1Gi→10Gi（transactions/notifications 膨脹寫爆 pg_wal crashloop）
    # 既有叢集 STS volumeClaimTemplates 不可變，升級時需 override 回原值（PVC 已線上擴容）
    storage: 10Gi
    external:
      host: ""
      port: 5432

  kafka:
    enabled: true
    image: confluentinc/cp-kafka:7.5.0
    clusterId: "MkU3OEVBNTcwNTJENDM2Qk"
    # 2026-07-10: 1Gi→10Gi（線上曾擴到 5Gi 仍寫爆 crashloop），搭配 template 的 retention 防復發
    storage: 10Gi
    external:
      bootstrapServers: ""

# ===========================================
# 可觀測性
# ===========================================
observability:
  otelCollector:
    enabled: false
    image: otel/opentelemetry-collector-contrib:0.105.0
    external:
      endpoint: "http://alloy.alloy:4318"

  tempo:
    enabled: false
    image: grafana/tempo:2.3.0
    storage: 2Gi
    external:
      endpoint: "http://tempo.tempo:4318"

  loki:
    enabled: true
    image: grafana/loki:3.7.3
    storage: 2Gi
    external:
      endpoint: ""

  prometheus:
    enabled: false
    image: prom/prometheus:v2.48.0
    storage: 2Gi
    external:
      endpoint: "http://rancher-monitoring-prometheus.cattle-monitoring-system:9090"

  grafana:
    enabled: false
    image: grafana/grafana:10.2.0
    adminUser: admin
    adminPassword: admin
    external:
      endpoint: "http://rancher-monitoring-grafana.cattle-monitoring-system:80"

  # Prometheus Operator ServiceMonitor：讓叢集 Prometheus scrape 各 Spring Boot
  # 服務的 /actuator/prometheus（第一方 micrometer 指標，與 Alloy spanmetrics 互補）。
  # 僅在叢集存在 monitoring.coreos.com/v1 CRD 時才會渲染。
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /actuator/prometheus
    # rancher Prometheus 的 serviceMonitorSelector 為空 {}，不需此標籤即可被抓，
    # 保留此值讓歸屬更明確；設為空字串可略過。
    releaseLabel: "rancher-monitoring"

  # PrometheusRule（停用中的替代方案）：把 SLO/infra 告警以 K8s CRD 形式交給 rancher Prometheus
  # 評估。目前**告警由中央 Grafana 管**（grafana/alerting/push_to_grafana.py 推 slo-alerts.yaml，
  # UI 可編輯），故此處 enabled=false 以免與 Grafana 重複告警。若日後改走 Prometheus/Alertmanager
  # 路線，設 true 即可（規則由 gen_prometheusrule.py 從同一份 slo-alerts.yaml 生成）。
  prometheusRule:
    enabled: false

# ===========================================
# 敏感資料
# ===========================================
secrets:
  dbPassword: litebank_pass
  jwtSecret: "your-secret-key-change-in-production-min-256-bits-required-for-hs256-algorithm"
  jwtExpiration: "86400000"

# ===========================================
# 服務共用設定
# ===========================================
services:
  common:
    imagePullPolicy: Always  # 使用 latest tag 時必須設為 Always
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  # Data Layer
  userService:
    image: user-service:latest
    port: 8080
    replicas: 1

  accountService:
    image: account-service:latest
    port: 8081
    replicas: 1

  transactionService:
    image: transaction-service:latest
    port: 8082
    replicas: 1

  exchangeRateService:
    image: exchange-rate-service:latest
    port: 8084
    replicas: 1

  # Coordination Layer
  tellerService:
    image: teller-service:latest
    port: 8083
    replicas: 1

  exchangeService:
    image: exchange-service:latest
    port: 8085
    replicas: 1

  # Analytics
  analyticsProcessor:
    image: analytics-processor-service:latest
    port: 8087
    replicas: 1

  analyticsQuery:
    image: analytics-query-service:latest
    port: 8088
    replicas: 1

  # Notification
  notificationService:
    image: notification-service:latest
    port: 8089
    replicas: 1
    cleanup:
      readRetentionDays: 7      # 已讀通知保留天數
      unreadRetentionDays: 7    # 未讀通知保留天數（壓測通知不會被讀，過長會塞爆磁碟）

  # Gateway
  apiGateway:
    image: api-gateway:latest
    port: 8080
    replicas: 1

  # Frontend
  dashboard:
    image: dashboard:latest
    port: 80
    replicas: 1

# ===========================================
# 網路入口
# ===========================================

# Ingress 配置
ingress:
  enabled: false
  className: nginx
  host: litebank.local
  tls:
    enabled: false
    secretName: litebank-tls
  annotations: {}

# Gateway API 配置
gateway:
  enabled: true
  className: cilium
  listeners:
    - name: http
      port: 80
      protocol: HTTP
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        enabled: false
        secretName: litebank-tls
  routes:
    host: litebank.192.168.1.70.nip.io
    # 額外路由 (可選)
    extraRoutes:
      - name: grafana
        path: /grafana
        service: grafana
        port: 3000
