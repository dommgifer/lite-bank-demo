# 由 grafana/alerting/gen_prometheusrule.py 從 slo-alerts.yaml 自動生成，請勿手改。
# 改規則 → 改 slo-alerts.yaml → 重跑該腳本。經 templates/prometheusrules.yaml 的
# .Files.Get 併入 PrometheusRule（保留 {{ $labels.* }} 字面量不被 Helm 解析）。
groups:
- name: litebank-slo-burn-rate
  interval: 1m
  rules:
  - alert: LitebankBrTransfersCrit
    expr: '((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[1h])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER"}[1h]))) / 0.005 > 14.4)

      and

      ((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[5m])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER"}[5m]))) / 0.005 > 14.4)'
    labels:
      severity: critical
      layer: business
      slo: transfers
      service: teller-service
      http_route: /api/v1/transfers
    annotations:
      summary: 轉帳 error budget 高速燃燒：burn rate > 14.4x（1h & 5m 雙窗口）
      description: 1 小時內將燒掉約 2% 月度 budget，預估 ~2 天耗盡。立即介入。
  - alert: LitebankBrTransfersWarn
    expr: '((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[6h])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER"}[6h]))) / 0.005 > 6)

      and

      ((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[30m])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER"}[30m]))) / 0.005 > 6)'
    labels:
      severity: warning
      layer: business
      slo: transfers
      service: teller-service
      http_route: /api/v1/transfers
    annotations:
      summary: 轉帳 error budget 加速燃燒：burn rate > 6x（6h & 30m 雙窗口）
      description: budget 消耗加速，當班確認根因。
  - alert: LitebankBrDepositsCrit
    expr: '((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/deposits",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[1h])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/deposits",span_kind="SPAN_KIND_SERVER"}[1h]))) / 0.005 > 14.4)

      and

      ((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/deposits",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[5m])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/deposits",span_kind="SPAN_KIND_SERVER"}[5m]))) / 0.005 > 14.4)'
    labels:
      severity: critical
      layer: business
      slo: deposits
      service: teller-service
      http_route: /api/v1/deposits
    annotations:
      summary: 存款 error budget 高速燃燒：burn rate > 14.4x（1h & 5m 雙窗口）
      description: 1 小時內將燒掉約 2% 月度 budget，立即介入。
  - alert: LitebankBrDepositsWarn
    expr: '((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/deposits",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[6h])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/deposits",span_kind="SPAN_KIND_SERVER"}[6h]))) / 0.005 > 6)

      and

      ((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/deposits",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[30m])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/deposits",span_kind="SPAN_KIND_SERVER"}[30m]))) / 0.005 > 6)'
    labels:
      severity: warning
      layer: business
      slo: deposits
      service: teller-service
      http_route: /api/v1/deposits
    annotations:
      summary: 存款 error budget 加速燃燒：burn rate > 6x（6h & 30m 雙窗口）
      description: budget 消耗加速，當班確認根因。
  - alert: LitebankBrWithdrawalsCrit
    expr: '((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/withdrawals",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[1h])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/withdrawals",span_kind="SPAN_KIND_SERVER"}[1h]))) / 0.005 > 14.4)

      and

      ((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/withdrawals",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[5m])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/withdrawals",span_kind="SPAN_KIND_SERVER"}[5m]))) / 0.005 > 14.4)'
    labels:
      severity: critical
      layer: business
      slo: withdrawals
      service: teller-service
      http_route: /api/v1/withdrawals
    annotations:
      summary: 提款 error budget 高速燃燒：burn rate > 14.4x（1h & 5m 雙窗口）
      description: 1 小時內將燒掉約 2% 月度 budget，立即介入。
  - alert: LitebankBrWithdrawalsWarn
    expr: '((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/withdrawals",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[6h])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/withdrawals",span_kind="SPAN_KIND_SERVER"}[6h]))) / 0.005 > 6)

      and

      ((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/withdrawals",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[30m])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/withdrawals",span_kind="SPAN_KIND_SERVER"}[30m]))) / 0.005 > 6)'
    labels:
      severity: warning
      layer: business
      slo: withdrawals
      service: teller-service
      http_route: /api/v1/withdrawals
    annotations:
      summary: 提款 error budget 加速燃燒：burn rate > 6x（6h & 30m 雙窗口）
      description: budget 消耗加速，當班確認根因。
  - alert: LitebankBrExchangesCrit
    expr: '((1 - sum(rate(litebank_calls_total{service_name="exchange-service",http_route="/api/v1/exchanges",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[1h])) / sum(rate(litebank_calls_total{service_name="exchange-service",http_route="/api/v1/exchanges",span_kind="SPAN_KIND_SERVER"}[1h]))) / 0.01 > 14.4)

      and

      ((1 - sum(rate(litebank_calls_total{service_name="exchange-service",http_route="/api/v1/exchanges",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[5m])) / sum(rate(litebank_calls_total{service_name="exchange-service",http_route="/api/v1/exchanges",span_kind="SPAN_KIND_SERVER"}[5m]))) / 0.01 > 14.4)'
    labels:
      severity: critical
      layer: business
      slo: exchanges
      service: exchange-service
      http_route: /api/v1/exchanges
    annotations:
      summary: 換匯 error budget 高速燃燒：burn rate > 14.4x（1h & 5m 雙窗口）
      description: 1 小時內將燒掉約 2% 月度 budget，立即介入。
  - alert: LitebankBrExchangesWarn
    expr: '((1 - sum(rate(litebank_calls_total{service_name="exchange-service",http_route="/api/v1/exchanges",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[6h])) / sum(rate(litebank_calls_total{service_name="exchange-service",http_route="/api/v1/exchanges",span_kind="SPAN_KIND_SERVER"}[6h]))) / 0.01 > 6)

      and

      ((1 - sum(rate(litebank_calls_total{service_name="exchange-service",http_route="/api/v1/exchanges",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[30m])) / sum(rate(litebank_calls_total{service_name="exchange-service",http_route="/api/v1/exchanges",span_kind="SPAN_KIND_SERVER"}[30m]))) / 0.01 > 6)'
    labels:
      severity: warning
      layer: business
      slo: exchanges
      service: exchange-service
      http_route: /api/v1/exchanges
    annotations:
      summary: 換匯 error budget 加速燃燒：burn rate > 6x（6h & 30m 雙窗口）
      description: budget 消耗加速，當班確認根因。
  - alert: LitebankBrLoginCrit
    expr: '((1 - sum(rate(litebank_calls_total{service_name="user-service",http_route="/api/v1/auth/login",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[1h])) / sum(rate(litebank_calls_total{service_name="user-service",http_route="/api/v1/auth/login",span_kind="SPAN_KIND_SERVER"}[1h]))) / 0.001 > 14.4)

      and

      ((1 - sum(rate(litebank_calls_total{service_name="user-service",http_route="/api/v1/auth/login",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[5m])) / sum(rate(litebank_calls_total{service_name="user-service",http_route="/api/v1/auth/login",span_kind="SPAN_KIND_SERVER"}[5m]))) / 0.001 > 14.4)'
    labels:
      severity: critical
      layer: business
      slo: login
      service: user-service
      http_route: /api/v1/auth/login
    annotations:
      summary: 登入 error budget 高速燃燒：burn rate > 14.4x（1h & 5m 雙窗口）
      description: 用戶無法登入是最直接的影響，立即介入。
  - alert: LitebankBrLoginWarn
    expr: '((1 - sum(rate(litebank_calls_total{service_name="user-service",http_route="/api/v1/auth/login",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[6h])) / sum(rate(litebank_calls_total{service_name="user-service",http_route="/api/v1/auth/login",span_kind="SPAN_KIND_SERVER"}[6h]))) / 0.001 > 6)

      and

      ((1 - sum(rate(litebank_calls_total{service_name="user-service",http_route="/api/v1/auth/login",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[30m])) / sum(rate(litebank_calls_total{service_name="user-service",http_route="/api/v1/auth/login",span_kind="SPAN_KIND_SERVER"}[30m]))) / 0.001 > 6)'
