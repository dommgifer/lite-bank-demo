    labels:
      severity: warning
      layer: business
      slo: balance
      service: account-service
      http_route: /api/v1/accounts/{accountId}/balance
    annotations:
      summary: 帳戶查詢 error budget 加速燃燒：burn rate > 6x（6h & 30m 雙窗口）
      description: budget 消耗加速，當班確認根因。
- name: litebank-slo-latency
  interval: 1m
  rules:
  - alert: LitebankLatTransfersWarn
    expr: histogram_quantile(0.99, sum(rate(litebank_duration_milliseconds_bucket{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER"}[5m])) by (le)) > 3000
    for: 5m
    labels:
      severity: warning
      layer: business
      slo: transfers
      service: teller-service
      http_route: /api/v1/transfers
    annotations:
      summary: 轉帳 P99 延遲超過 SLO（3000ms）持續 5 分鐘
  - alert: LitebankLatTransfersCrit
    expr: histogram_quantile(0.99, sum(rate(litebank_duration_milliseconds_bucket{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER"}[5m])) by (le)) > 6000
    for: 2m
    labels:
      severity: critical
      layer: business
      slo: transfers
      service: teller-service
      http_route: /api/v1/transfers
    annotations:
      summary: 轉帳 P99 延遲達 SLO 兩倍（6000ms）持續 2 分鐘
  - alert: LitebankLatDepositsWarn
    expr: histogram_quantile(0.99, sum(rate(litebank_duration_milliseconds_bucket{service_name="teller-service",http_route="/api/v1/deposits",span_kind="SPAN_KIND_SERVER"}[5m])) by (le)) > 2000
