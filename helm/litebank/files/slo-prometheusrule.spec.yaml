    annotations:
      summary: 帳戶查詢 error budget 高速燃燒：burn rate > 14.4x（1h & 5m 雙窗口）
      description: 餘額查詢是高頻核心讀取路徑，立即介入。
  - alert: LitebankBrBalanceWarn
