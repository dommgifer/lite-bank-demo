- name: litebank-infra
  interval: 1m
  rules:
  - alert: LitebankInfTransactionErrWarn
    expr: sum(rate(litebank_calls_total{service_name="transaction-service",span_kind="SPAN_KIND_SERVER",status_code="STATUS_CODE_ERROR"}[5m])) / sum(rate(litebank_calls_total{service_name="transaction-service",span_kind="SPAN_KIND_SERVER"}[5m])) > 0.01
    for: 2m
    labels:
      severity: warning
      layer: infra
      service: transaction-service
    annotations:
      summary: transaction-service 錯誤率超過 1% 持續 2 分鐘（餘額寫入路徑）
  - alert: LitebankInfTransactionErrCrit
    expr: sum(rate(litebank_calls_total{service_name="transaction-service",span_kind="SPAN_KIND_SERVER",status_code="STATUS_CODE_ERROR"}[5m])) / sum(rate(litebank_calls_total{service_name="transaction-service",span_kind="SPAN_KIND_SERVER"}[5m])) > 0.05
    for: 2m
    labels:
      severity: critical
      layer: infra
      service: transaction-service
    annotations:
      summary: transaction-service 錯誤率超過 5% 持續 2 分鐘，餘額寫入受阻
  - alert: LitebankInfHikariWarn
    expr: hikaricp_connections_pending > 2
    for: 3m
    labels:
      severity: warning
      layer: infra
    annotations:
      summary: '{{ $labels.application }} DB 連線池開始排隊（pending > 2）持續 3 分鐘'
  - alert: LitebankInfHikariCrit
    expr: hikaricp_connections_pending > 10
    for: 1m
    labels:
      severity: critical
      layer: infra
    annotations:
      summary: '{{ $labels.application }} DB 連線池接近耗盡（pending > 10）持續 1 分鐘'
  - alert: LitebankInfHeapWarn
    expr: sum by (application) (jvm_memory_used_bytes{area="heap"}) / sum by (application) (jvm_memory_max_bytes{area="heap"}) * 100 > 85
    for: 5m
    labels:
      severity: warning
      layer: infra
    annotations:
      summary: '{{ $labels.application }} JVM Heap 使用率超過 85% 持續 5 分鐘'
  - alert: LitebankInfHeapCrit
    expr: sum by (application) (jvm_memory_used_bytes{area="heap"}) / sum by (application) (jvm_memory_max_bytes{area="heap"}) * 100 > 95
    for: 2m
    labels:
      severity: critical
      layer: infra
    annotations:
      summary: '{{ $labels.application }} JVM Heap 使用率超過 95% 持續 2 分鐘，瀕臨 OOM'
  - alert: LitebankInfTomcatWarn
    expr: tomcat_threads_busy_threads / tomcat_threads_config_max_threads > 0.8
    for: 3m
    labels:
      severity: warning
      layer: infra
    annotations:
