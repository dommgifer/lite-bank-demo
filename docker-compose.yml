services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: litebank-postgres
    environment:
      POSTGRES_DB: litebank
      POSTGRES_USER: litebank_user
      POSTGRES_PASSWORD: litebank_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litebank_user -d litebank"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - litebank

  # Flyway Database Migration
  flyway:
    image: flyway/flyway:10-alpine
    container_name: litebank-flyway
    command: migrate
    volumes:
      - ./db/migration:/flyway/sql
      - ./db/flyway.conf:/flyway/conf/flyway.conf
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/litebank
      FLYWAY_USER: litebank_user
      FLYWAY_PASSWORD: litebank_pass
      FLYWAY_SCHEMAS: public
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - litebank

  # Kafka (KRaft mode - no ZooKeeper)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: litebank-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - litebank

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    container_name: litebank-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "8889:8889"   # Prometheus exporter metrics
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - litebank

  # Grafana Tempo (Distributed Tracing)
  tempo:
    image: grafana/tempo:2.3.0
    container_name: litebank-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./grafana/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo query frontend
      - "4317"        # OTLP gRPC (internal)
    networks:
      - litebank

  # Grafana Loki (Log Aggregation)
  loki:
    image: grafana/loki:2.9.0
    container_name: litebank-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./grafana/loki.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - litebank

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: litebank-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--enable-feature=exemplar-storage'
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - litebank

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:10.2.0
    container_name: litebank-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./grafana/dashboard-provisioning.yaml:/etc/grafana/provisioning/dashboards/dashboard-provisioning.yaml
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards/json
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - litebank

  # User Service (Spring Boot)
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: litebank-user-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: litebank
      DB_USER: litebank_user
      DB_PASSWORD: litebank_pass
      JWT_SECRET: your-secret-key-change-in-production-min-256-bits-required-for-hs256-algorithm
      JWT_EXPIRATION: 86400000
      OTEL_SERVICE_NAME: user-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      ENVIRONMENT: local
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 210s
    networks:
      - litebank

  account-service:
    build:
      context: ./services/account-service
      dockerfile: Dockerfile
    container_name: litebank-account-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: litebank
      DB_USER: litebank_user
      DB_PASSWORD: litebank_pass
      OTEL_SERVICE_NAME: account-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      ENVIRONMENT: local
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 120s
    networks:
      - litebank

  transaction-service:
    build:
      context: ./services/transaction-service
      dockerfile: Dockerfile
    container_name: litebank-transaction-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: litebank
      DB_USER: litebank_user
      DB_PASSWORD: litebank_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_SERVICE_NAME: transaction-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      ENVIRONMENT: local
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 210s
    networks:
      - litebank

  transfer-service:
    build:
      context: ./services/transfer-service
      dockerfile: Dockerfile
    container_name: litebank-transfer-service
    environment:
      ACCOUNT_SERVICE_URL: http://account-service:8081
      TRANSACTION_SERVICE_URL: http://transaction-service:8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_SERVICE_NAME: transfer-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      ENVIRONMENT: local
      SERVER_PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      account-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - litebank

  # Exchange Rate Service (Spring Boot) - Provides currency exchange rates
  exchange-rate-service:
    build:
      context: ./services/exchange-rate-service
      dockerfile: Dockerfile
    container_name: litebank-exchange-rate-service
    environment:
      OTEL_SERVICE_NAME: exchange-rate-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      ENVIRONMENT: local
      SERVER_PORT: 8084
    ports:
      - "8084:8084"
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - litebank

  # Deposit Withdrawal Service (Spring Boot) - Handles deposit and withdrawal operations
  deposit-withdrawal-service:
    build:
      context: ./services/deposit-withdrawal-service
      dockerfile: Dockerfile
    container_name: litebank-deposit-withdrawal-service
    environment:
      ACCOUNT_SERVICE_URL: http://account-service:8081
      TRANSACTION_SERVICE_URL: http://transaction-service:8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_SERVICE_NAME: deposit-withdrawal-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      ENVIRONMENT: local
      SERVER_PORT: 8086
    ports:
      - "8086:8086"
    depends_on:
      account-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - litebank

  # Exchange Service (Spring Boot) - Handles currency exchange operations
  exchange-service:
    build:
      context: ./services/exchange-service
      dockerfile: Dockerfile
    container_name: litebank-exchange-service
    environment:
      ACCOUNT_SERVICE_URL: http://account-service:8081
      TRANSACTION_SERVICE_URL: http://transaction-service:8082
      EXCHANGE_RATE_SERVICE_URL: http://exchange-rate-service:8084
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_SERVICE_NAME: exchange-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      ENVIRONMENT: local
      SERVER_PORT: 8085
    ports:
      - "8085:8085"
    depends_on:
      account-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      exchange-rate-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - litebank

  # API Gateway (Spring Cloud Gateway) - Main entry point for all client requests
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: litebank-api-gateway
    environment:
      JWT_SECRET: your-secret-key-change-in-production-min-256-bits-required-for-hs256-algorithm
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/javaagent.jar"
      OTEL_SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_TRACES_SAMPLER: always_on
      OTEL_LOGS_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      SPRING_PROFILES_ACTIVE: default
      JAVA_OPTS: "-Xms512m -Xmx1024m"
    ports:
      - "9000:8080"
    depends_on:
      user-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      transfer-service:
        condition: service_healthy
      exchange-rate-service:
        condition: service_healthy
      exchange-service:
        condition: service_healthy
      deposit-withdrawal-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - litebank

  # Analytics Processor Service (Kafka Consumer)
  analytics-processor-service:
    build:
      context: ./services/analytics-processor-service
      dockerfile: Dockerfile
    container_name: litebank-analytics-processor-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: litebank
      DB_USER: litebank_user
      DB_PASSWORD: litebank_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_SERVICE_NAME: analytics-processor-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      ENVIRONMENT: local
      SERVER_PORT: 8087
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - litebank

  # Analytics Query Service (REST API)
  analytics-query-service:
    build:
      context: ./services/analytics-query-service
      dockerfile: Dockerfile
    container_name: litebank-analytics-query-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: litebank
      DB_USER: litebank_user
      DB_PASSWORD: litebank_pass
      OTEL_SERVICE_NAME: analytics-query-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      ENVIRONMENT: local
      SERVER_PORT: 8088
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - litebank

  # Notification Service (SSE-based real-time notifications)
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: litebank-notification-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/litebank
      SPRING_DATASOURCE_USERNAME: litebank_user
      SPRING_DATASOURCE_PASSWORD: litebank_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_SERVICE_NAME: notification-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      ENVIRONMENT: local
      SERVER_PORT: 8089
    ports:
      - "8089:8089"
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8089/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - litebank

  # Frontend Dashboard (React + Nginx)
  # 使用 profile，預設不啟動，需要時用 --profile frontend
  dashboard:
    profiles: ["frontend"]
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    container_name: litebank-dashboard
    environment:
      # 可透過環境變數配置後端服務 URL，不需重新 build
      API_GATEWAY_URL: http://api-gateway:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8089
    ports:
      - "3001:80"
    depends_on:
      - api-gateway
      - notification-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - litebank

networks:
  litebank:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  tempo_data:
  loki_data:
  prometheus_data:
  grafana_data:
