# Lite Bank SLO 告警規則（Grafana-managed alert rules provisioning）
#
# 設計依據：docs/sre/alert-design.md
# 指標來源：Alloy spanmetrics（litebank_*）+ Micrometer（hikaricp_/jvm_/tomcat_）
#
# 重要：錯誤判定一律使用 OTel span status `status_code!="STATUS_CODE_ERROR"`，
#       spanmetrics 沒有 HTTP 5xx 維度。
#
# Burn rate 採 Google SRE 多窗口多燃燒率（MWMB）：雙窗口 AND 寫在單一 PromQL，
# 不燒時回空向量，搭配 noDataState=OK 視為健康；服務沉默由 INF-005 absent() 負責。
#
# 注意：absent() 規則也用 noDataState=OK。absent() 在「服務正常（series 存在）」時
# 回空向量 → NoData，若設 Alerting 會在服務健康時誤報。偵測沉默靠 absent() 回 1 過 threshold。
apiVersion: 1

groups:
  # ============================================================
  # 業務 SLO — Error Budget Burn Rate（MWMB）
  # ============================================================
  - orgId: 1
    name: LiteBank SLO - Burn Rate
    folder: Lite Bank
    interval: 1m
    rules:
      # ---------- 轉帳 (99.5%, budget 0.005) ----------
      - uid: litebank-br-transfers-crit
        title: "[Critical] 轉帳 SLO Burn Rate 14.4x"
        condition: C
        for: 0m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          layer: business
          slo: transfers
          service: teller-service
          http_route: "/api/v1/transfers"
        annotations:
          summary: "轉帳 error budget 高速燃燒：burn rate > 14.4x（1h & 5m 雙窗口）"
          description: "1 小時內將燒掉約 2% 月度 budget，預估 ~2 天耗盡。立即介入。"
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
              expr: |
                ((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[1h])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER"}[1h]))) / 0.005 > 14.4)
                and
                ((1 - sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER",status_code!="STATUS_CODE_ERROR"}[5m])) / sum(rate(litebank_calls_total{service_name="teller-service",http_route="/api/v1/transfers",span_kind="SPAN_KIND_SERVER"}[5m]))) / 0.005 > 14.4)
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }

      - uid: litebank-br-transfers-warn
        title: "[Warning] 轉帳 SLO Burn Rate 6x"
        condition: C
