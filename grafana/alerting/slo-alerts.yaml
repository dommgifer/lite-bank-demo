      - uid: litebank-inf-tomcat-crit
        title: "[Critical] Tomcat 執行緒使用率 > 90%"
        condition: C
        for: 1m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical, layer: infra }
        annotations:
          summary: "{{ $labels.application }} Tomcat 執行緒使用率超過 90% 持續 1 分鐘，瀕臨拒絕請求"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
              expr: 'tomcat_threads_busy_threads / tomcat_threads_config_max_threads > 0.9'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }

      # INF-005 服務沉默（spanmetrics 完全消失）
      - uid: litebank-inf-absent-api-gateway
        title: "[Critical] api-gateway 無流量訊號"
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical, layer: infra, service: api-gateway }
        annotations:
          summary: "api-gateway spanmetrics 連續 5 分鐘無資料，疑似服務不可達"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
              expr: 'absent(litebank_calls_total{service_name="api-gateway",span_kind="SPAN_KIND_SERVER"})'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
