  # ============================================================
  # 基礎設施告警
  # ============================================================
  - orgId: 1
    name: LiteBank Infra
    folder: Lite Bank
    interval: 1m
    rules:
      # INF-001 transaction-service 錯誤率（唯一寫帳服務）
      - uid: litebank-inf-transaction-err-warn
        title: "[Warning] transaction-service 錯誤率 > 1%"
        condition: C
        for: 2m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning, layer: infra, service: transaction-service }
        annotations:
          summary: "transaction-service 錯誤率超過 1% 持續 2 分鐘（餘額寫入路徑）"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
              expr: 'sum(rate(litebank_calls_total{service_name="transaction-service",span_kind="SPAN_KIND_SERVER",status_code="STATUS_CODE_ERROR"}[5m])) / sum(rate(litebank_calls_total{service_name="transaction-service",span_kind="SPAN_KIND_SERVER"}[5m])) > 0.01'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }

      - uid: litebank-inf-transaction-err-crit
        title: "[Critical] transaction-service 錯誤率 > 5%"
        condition: C
        for: 2m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical, layer: infra, service: transaction-service }
        annotations:
          summary: "transaction-service 錯誤率超過 5% 持續 2 分鐘，餘額寫入受阻"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
              expr: 'sum(rate(litebank_calls_total{service_name="transaction-service",span_kind="SPAN_KIND_SERVER",status_code="STATUS_CODE_ERROR"}[5m])) / sum(rate(litebank_calls_total{service_name="transaction-service",span_kind="SPAN_KIND_SERVER"}[5m])) > 0.05'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }

      # INF-002 HikariCP 連線池排隊
      - uid: litebank-inf-hikari-warn
        title: "[Warning] HikariCP 待連線 > 2"
        condition: C
        for: 3m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning, layer: infra }
        annotations:
          summary: "{{ $labels.application }} DB 連線池開始排隊（pending > 2）持續 3 分鐘"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
              expr: 'hikaricp_connections_pending > 2'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }

      - uid: litebank-inf-hikari-crit
        title: "[Critical] HikariCP 待連線 > 10"
        condition: C
        for: 1m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical, layer: infra }
        annotations:
          summary: "{{ $labels.application }} DB 連線池接近耗盡（pending > 10）持續 1 分鐘"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
              expr: 'hikaricp_connections_pending > 10'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }

      # INF-003 JVM Heap 壓力
      - uid: litebank-inf-heap-warn
        title: "[Warning] JVM Heap 使用率 > 85%"
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning, layer: infra }
        annotations:
          summary: "{{ $labels.application }} JVM Heap 使用率超過 85% 持續 5 分鐘"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
              expr: 'sum by (application) (jvm_memory_used_bytes{area="heap"}) / sum by (application) (jvm_memory_max_bytes{area="heap"}) * 100 > 85'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }

      - uid: litebank-inf-heap-crit
        title: "[Critical] JVM Heap 使用率 > 95%"
        condition: C
        for: 2m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical, layer: infra }
        annotations:
          summary: "{{ $labels.application }} JVM Heap 使用率超過 95% 持續 2 分鐘，瀕臨 OOM"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
              expr: 'sum by (application) (jvm_memory_used_bytes{area="heap"}) / sum by (application) (jvm_memory_max_bytes{area="heap"}) * 100 > 95'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }

      # INF-004 Tomcat 執行緒
      - uid: litebank-inf-tomcat-warn
        title: "[Warning] Tomcat 執行緒使用率 > 80%"
        condition: C
        for: 3m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning, layer: infra }
        annotations:
          summary: "{{ $labels.application }} Tomcat 執行緒使用率超過 80% 持續 3 分鐘"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              editorMode: code
              intervalMs: 1000
              maxDataPoints: 43200
              expr: 'tomcat_threads_busy_threads / tomcat_threads_config_max_threads > 0.8'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
