  # ============================================================
  # 業務 SLO — P99 延遲
  # ============================================================
  - orgId: 1
    name: LiteBank SLO - Latency
    folder: Lite Bank
    interval: 1m
    rules:
      - uid: litebank-lat-transfers-warn
        title: "[Warning] 轉帳 P99 延遲 > 3000ms"
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning, layer: business, slo: transfers, service: teller-service, http_route: "/api/v1/transfers" }
        annotations:
          summary: "轉帳 P99 延遲超過 SLO（3000ms）持續 5 分鐘"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
