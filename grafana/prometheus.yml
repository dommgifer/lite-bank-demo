global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'lite-bank-demo'
    environment: 'local'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OpenTelemetry Collector - internal telemetry
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # OpenTelemetry Collector - application metrics (包含 span metrics 和 exemplars)
  - job_name: 'otel-collector-apps'
    static_configs:
      - targets: ['otel-collector:8889']
    # 啟用 exemplar 支援
    enable_http2: true
