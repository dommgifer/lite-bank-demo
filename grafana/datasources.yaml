apiVersion: 1

datasources:
  # Grafana Tempo - Distributed Tracing
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: 'loki'
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        filterByTraceID: false
        filterBySpanID: false
        customQuery: true
        query: '{job=~".*$${__span.tags["service.name"]}.*"} |= "$${__span.traceId}"'
      tracesToMetrics:
        datasourceUid: 'prometheus'
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
        tags:
          - key: service.name
            value: service_name
        queries:
          - name: 'Request Rate'
            query: 'sum(rate(litebank_calls_total{service_name="$${__tags.service_name}"}[5m]))'
          - name: 'Error Rate'
            query: 'sum(rate(litebank_calls_total{service_name="$${__tags.service_name}", status_code=~"5.."}[5m]))'
          - name: 'Latency P50'
            query: 'histogram_quantile(0.5, sum(rate(litebank_duration_milliseconds_bucket{service_name="$${__tags.service_name}"}[5m])) by (le))'
          - name: 'Latency P95'
            query: 'histogram_quantile(0.95, sum(rate(litebank_duration_milliseconds_bucket{service_name="$${__tags.service_name}"}[5m])) by (le))'
          - name: 'Latency P99'
            query: 'histogram_quantile(0.99, sum(rate(litebank_duration_milliseconds_bucket{service_name="$${__tags.service_name}"}[5m])) by (le))'
      serviceMap:
        datasourceUid: 'prometheus'
      nodeGraph:
        enabled: true

  # Grafana Loki - Log Aggregation
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"traceid":"([0-9a-fA-F]+)"'
          name: TraceID
          url: '$${__value.raw}'

  # Prometheus - Metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    jsonData:
      httpMethod: POST
      # 啟用 exemplar 支援 - 從 metrics 跳轉到 traces
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
          urlDisplayLabel: 'View Trace'
