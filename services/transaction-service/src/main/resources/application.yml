spring:
  application:
    name: transaction-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:litebank}
    username: ${DB_USER:litebank_user}
    password: ${DB_PASSWORD:litebank_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      # 止血：連線池預設 max=10，一有慢查詢就整池餓死；調大緩衝
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      # 拿不到連線時 5s 快速失敗，取代預設 30s 排隊堆積
      connection-timeout: ${DB_POOL_CONN_TIMEOUT:5000}
      # DB 層 statement timeout：單一 SQL 超過 3s 由 PostgreSQL 中止並釋放連線，
      # 避免慢查詢（如全表 COUNT）長期佔死連線拖垮寫入交易
      data-source-properties:
        options: -c statement_timeout=3000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8082}
  tomcat:
    mbeanregistry:
      enabled: true

otel:
  service:
    name: ${OTEL_SERVICE_NAME:transaction-service}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name:${OTEL_SERVICE_NAME}}

logging:
  level:
    com.litebank.transactionservice: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

# Kafka Topics
kafka:
  topic:
    transaction-events: transaction-events

# SpringDoc OpenAPI / Swagger UI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: Transaction Service API
    version: 1.0.0
    description: Transaction service for Lite Bank Demo
