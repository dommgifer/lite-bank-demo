server:
  port: ${SERVER_PORT:8083}
  tomcat:
    mbeanregistry:
      enabled: true

spring:
  application:
    name: teller-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Resilience4j Circuit Breaker (P-001 fix for TEL-W001)
# NOTE: register-health-indicator MUST stay false — see "重要陷阱" in P-001 handoff.
# An OPEN breaker must NOT make /actuator/health DOWN, or the probes would restart the
# pod for a different reason and defeat the whole purpose of the circuit breaker.
resilience4j:
  circuitbreaker:
    instances:
      accountService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: false
      transactionService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: false

# Account Service Configuration
account:
  service:
    url: ${ACCOUNT_SERVICE_URL:http://account-service:8081}

# Transaction Service Configuration
transaction:
  service:
    url: ${TRANSACTION_SERVICE_URL:http://transaction-service:8082}

# OpenTelemetry Configuration
otel:
  service:
    name: ${OTEL_SERVICE_NAME:teller-service}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name:${OTEL_SERVICE_NAME}}

# Logging Configuration
logging:
  level:
    com.litebank.tellerservice: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# SpringDoc OpenAPI / Swagger UI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: Teller Service API
    version: 1.0.0
    description: Teller service (transfer + deposit + withdrawal) for LiteBank Demo
