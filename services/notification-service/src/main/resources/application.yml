server:
  port: ${SERVER_PORT:8089}
  # Tomcat async timeout for SSE (in milliseconds)
  servlet:
    async:
      timeout: -1  # Disable async timeout for SSE

spring:
  mvc:
    async:
      request-timeout: -1  # Disable MVC async timeout
  application:
    name: notification-service

  # PostgreSQL Database
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/litebank}
    username: ${SPRING_DATASOURCE_USERNAME:litebank_user}
    password: ${SPRING_DATASOURCE_PASSWORD:litebank_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.litebank.notification: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] [%X{spanId:-}] %-5level %logger{36} - %msg%n"

otel:
  service:
    name: ${OTEL_SERVICE_NAME:notification-service}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-min-256-bits-required-for-hs256-algorithm}

# Notification cleanup settings
notification:
  cleanup:
    cron: "0 0 3 * * ?"           # 每天凌晨 3 點執行
    read-retention-days: 30       # 已讀通知保留 30 天
    unread-retention-days: 90     # 未讀通知保留 90 天
