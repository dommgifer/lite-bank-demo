spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:litebank}
    username: ${DB_USER:litebank_user}
    password: ${DB_PASSWORD:litebank_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# Service URLs
services:
  account-service:
    url: ${ACCOUNT_SERVICE_URL:http://account-service:8081}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-min-256-bits-required-for-hs256-algorithm}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds

# OpenTelemetry Configuration
otel:
  service:
    name: ${OTEL_SERVICE_NAME:user-service}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
  resource:
    attributes: service.namespace=lite-bank-demo,deployment.environment=${ENVIRONMENT:local}

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    root: INFO
    com.litebank: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# SpringDoc OpenAPI / Swagger UI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: User Service API
    version: 1.0.0
    description: User authentication and management service for Lite Bank Demo
