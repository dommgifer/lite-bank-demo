server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Global CORS Configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3001"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "X-Trace-Id"
              - "traceparent"
            allowCredentials: true
            maxAge: 3600

      # Route Definitions
      routes:
        # User Service Routes (container internal port: 8080)
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: JwtAuthentication
              args:
                excludePaths: /api/v1/auth/login,/api/v1/auth/register

        # Account Service Routes (container internal port: 8081)
        - id: account-service
          uri: http://account-service:8081
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - JwtAuthentication

        # Recipient Service Routes (container internal port: 8081, part of account-service)
        - id: recipient-service
          uri: http://account-service:8081
          predicates:
            - Path=/api/v1/recipients/**
          filters:
            - JwtAuthentication

        # Transaction Service Routes (container internal port: 8082)
        - id: transaction-service
          uri: http://transaction-service:8082
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            - JwtAuthentication

        # Transfer Service Routes (container internal port: 8083)
        - id: transfer-service
          uri: http://transfer-service:8083
          predicates:
            - Path=/api/v1/transfers/**
          filters:
            - JwtAuthentication

        # Deposit Service Routes (container internal port: 8086)
        - id: deposit-service
          uri: http://deposit-withdrawal-service:8086
          predicates:
            - Path=/api/v1/deposits/**
          filters:
            - JwtAuthentication

        # Withdrawal Service Routes (container internal port: 8086)
        - id: withdrawal-service
          uri: http://deposit-withdrawal-service:8086
          predicates:
            - Path=/api/v1/withdrawals/**
          filters:
            - JwtAuthentication

        # Exchange Service Routes (container internal port: 8085)
        - id: exchange-service
          uri: http://exchange-service:8085
          predicates:
            - Path=/api/v1/exchanges/**
          filters:
            - JwtAuthentication

        # Exchange Rate Service Routes (container internal port: 8084)
        - id: exchange-rate-service
          uri: http://exchange-rate-service:8084
          predicates:
            - Path=/api/v1/rates/**
          filters:
            - JwtAuthentication

        # Analytics Query Service Routes (container internal port: 8088)
        - id: analytics-query-service
          uri: http://analytics-query-service:8088
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - JwtAuthentication

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:lite-bank-demo-secret-key-change-in-production-2024}
  expiration: 86400000  # 24 hours in milliseconds

# OpenTelemetry Configuration
otel:
  service:
    name: api-gateway
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}
  traces:
    sampler: always_on
  metrics:
    exporter: otlp

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    root: INFO
    com.litebank.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
